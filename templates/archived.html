<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Archived Jobs</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="container mt-5">
    <h2>Archived Jobs</h2>
    <a href="/admin" class="btn btn-primary mb-3">
         Back to Dashboard
    </a>

    <table class="table table-borderd table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Customer</th>
            <th>Phone</th>
            <th>Service</th>
            <th>Completed</th>
            <th>Actions</th>
        </tr>

        </thead>

        <tbody>
        {% for app in applications %}
        <tr>
            <td>{{ app[0] }}</td>
            <td>{{ app[1] }}</td>
            <td>{{ app[2] }}</td>
            <td>{{ app[5] }}</td>
            <td>{{ app[10] }}</td>

            <td>

            <a href="/restore/{{ app[0] }}" class="btn btn-success btn-sm">
                Restore
            </a>
        </td>
    </tr>

        {% endfor %}

        </tbody>

    </table>

</div>
</body>
</html>
