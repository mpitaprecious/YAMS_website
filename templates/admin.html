<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body>

<header>
    <h1>YAMS Admin Dashboard</h1>
</header>

<div class="content">

    <h2>Customer Applications</h2>

    <a href="/logout" class="button">
        logout
    </a>

    <a href="/archived" class="btn btn-secondary">
        Archived Jobs
    </a>

    <form method="GET" action="/admin" class="mb-2">
        <div class="input-group">
            <input type="text"
                   class="form-control"
                   name="search"
                   placeholder="Search by name, phone or service..."
                   value="{{ request.args.get('search','') }}">
            <button class="btn btn-primary" type="submit">
                Search
            </button>
        </div>
    </form>

    <table class="table table-bordered table-striped">

        <tr>
            <th>ID</th>
            <th>Customer</th>
            <th>Phone</th>
            <th>Service</th>
            <th>Date</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>

        {% for app in applications %}
        <tr>
            <td>{{ app[0] }}</td>
            <td>{{ app[1] }}</td>
            <td>{{ app[2] }}</td>
            <td>{{ app[5] }}</td>
            <td>{{ app[7] }}</td>
            <td>{{ app[8] }}</td>

            <td>
                <a href="/start/{{ app[0] }}" class="btn btn-primary btn-sm">
                    Start
                </a>

                <a href="/complete/{{ app[0] }}" class="btn btn-success btn-sm">
                    Complete
                </a>

                <a href="/archive/{{ app[0] }}" class="btn btn-warning btn-sm">
                    Archive
                </a>
            </td>

        </tr>
        {% endfor %}


    </table>

</div>


</body>
</html>
